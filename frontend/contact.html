<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SmartWaste</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar glass-card" id="mainNav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-recycle"></i></div>
                <span>SMARTWASTE</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="features.html">Features</a>
                <a href="report.html">Report Issue</a>
                <a href="leaderboard.html">Leaderboard</a>
                <a href="contact.html" class="active">Contact</a>
                <a href="faq.html">FAQ</a>
                <a href="dashboard.html" style="display: none;">Admin</a>
            </div>
            <button class="mobile-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <main class="container animate-in" style="padding: 100px 0;">
        <div class="section-badge">Get In Touch</div>
        <h1 class="text-gradient" style="font-size: 3.5rem; margin-bottom: 3rem;">Contact Our Team</h1>
        
        <div class="stats-grid">
            <div class="glass-card stat-item">
                <form id="contactForm" style="display: flex; flex-direction: column; gap: 1.5rem; width: 100%;">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="John Doe" required style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="john@example.com" required style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea placeholder="How can we help?" required style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 8px; min-height: 150px;"></textarea>
                    </div>
                    <button type="submit" class="btn-premium">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer style="padding: 60px 5%; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border); text-align: center;">
        <p>&copy; 2026 SmartWaste System. All rights reserved.</p>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
