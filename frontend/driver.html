<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | SmartWaste Fleet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body onload="initDriverPage()">
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fas fa-truck-pickup"></i></div>
                <span class="logo-text">FLEET OPS</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="driver.html" class="nav-item active"><i class="fas fa-tasks"></i> <span>Mission List</span></a>
                <a href="#" class="nav-item"><i class="fas fa-route"></i> <span>Route Plan</span></a>
                <a href="#" class="nav-item"><i class="fas fa-gas-pump"></i> <span>Fuel Log</span></a>
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i> <span>Go Off Duty</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dashboard-header animate-in">
                <div>
                    <h1 class="text-gradient">Fleet Operations</h1>
                    <p style="color: var(--text-muted);">Real-time mission queue for Dispatch Unit #402</p>
                </div>
                <div class="header-actions">
                    <div class="status-indicator live">ACTIVE DUTY</div>
                    <div class="user-profile glass-card">
                        <img src="https://ui-avatars.com/api/?name=Driver&background=10b981&color=fff" alt="Driver">
                    </div>
                </div>
            </header>

            <div id="taskList" class="mission-grid">
                <!-- Mission Cards via JS -->
            </div>

            <div id="emptyState" class="empty-state animate-in" style="display: none;">
                <div class="empty-icon"><i class="fas fa-circle-check"></i></div>
                <h2>All Clear!</h2>
                <p>Your sector is currently clean. Await further dispatch instructions from municipal control.</p>
            </div>
        </main>
    </div>

    <!-- Collection Form Modal -->
    <div id="completeModal" class="modal-overlay" style="display: none;">
        <div class="glass-card modal-content animate-in">
            <div class="modal-header">
                <h2>Confirm Collection</h2>
                <button class="btn-close" onclick="hideModal('completeModal')"><i class="fas fa-times"></i></button>
            </div>
            <p id="currentReportId" style="display:none;"></p>
            <div class="form-group">
                <label>Total Load Weight (kg)</label>
                <div class="input-with-icon">
                    <i class="fas fa-weight-hanging"></i>
                    <input type="number" id="collectionWeight" placeholder="0.00">
                </div>
            </div>
            <div class="form-group">
                <label>Field Notes</label>
                <textarea id="collectionNotes" rows="3" placeholder="Any issues encountered during collection?"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-premium" onclick="submitCompletion()">Complete Mission</button>
                <button class="btn-premium secondary" onclick="hideModal('completeModal')">Abort</button>
            </div>
        </div>
    </div>

    <style>
        .sidebar {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
        }
        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; }
        .sidebar-logo { width: 32px; height: 32px; background: var(--grad-eco); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-weight: 800; letter-spacing: 1px; color: var(--text-white); }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-muted); text-decoration: none; margin-bottom: 8px; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(16, 185, 129, 0.1); color: var(--primary); }
        .sidebar-footer { margin-top: auto; border-top: 1px solid var(--glass-border); padding-top: 1rem; }

        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header-actions { display: flex; align-items: center; gap: 1.5rem; }
        .status-indicator.live { background: rgba(16, 185, 129, 0.1); color: var(--primary); padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .status-indicator.live::before { content: ''; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        
        .mission-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; }
        .mission-card { display: flex; flex-direction: column; gap: 1.5rem; }
        .mission-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .mission-id { font-size: 1.2rem; font-weight: 700; margin-top: 5px; }
        .mission-meta { color: var(--text-muted); font-size: 0.85rem; }
        
        .mission-details { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 15px; padding: 1.25rem; }
        .detail-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.95rem; }
        .detail-item i { color: var(--primary); width: 16px; }
        .reporter-note { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--glass-border); color: var(--text-muted); font-size: 0.85rem; font-style: italic; }

        .mission-image { border-radius: 12px; overflow: hidden; height: 180px; width: 100%; border: 1px solid var(--glass-border); }
        .mission-image img { width: 100%; height: 100%; object-fit: cover; }

        .mission-actions { display: flex; gap: 10px; }
        .mission-actions .btn-premium { flex: 1; justify-content: center; }

        .empty-state { text-align: center; padding: 6rem 2rem; display: flex; flex-direction: column; align-items: center; }
        .empty-icon { width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 2rem; }
        .empty-state h2 { margin-bottom: 1rem; }
        .empty-state p { color: var(--text-muted); max-width: 400px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { width: 100%; max-width: 450px; padding: 2.5rem; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .btn-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .input-with-icon { position: relative; }
        .input-with-icon i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .input-with-icon input { width: 100%; padding: 12px 12px 12px 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; }
        textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; resize: vertical; }

        .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 1rem; }
        .modal-actions .btn-premium { width: 100%; justify-content: center; }

        .text-gradient { background: var(--grad-eco); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        @media (max-width: 768px) {
            .mission-grid { grid-template-columns: 1fr; }
        }
    </style>

    <script src="js/app.js"></script>
    <script>
        async function initDriverPage() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (localStorage.getItem('role') !== 'driver') {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Use fetchWithAuth for secure API calls
                const res = await fetchWithAuth(`${API_URL}/driver/tasks/${user.id || user._id}`);
                if (!res || !res.ok) return;
                
                const tasks = await res.json();
                const container = document.getElementById('taskList');
                const emptyState = document.getElementById('emptyState');
                
                container.innerHTML = '';
                if (!tasks || tasks.length === 0) {
                    emptyState.style.display = 'flex';
                    return;
                } else {
                    emptyState.style.display = 'none';
                }

                tasks.forEach((task, index) => {
                    const card = `
                        <div class="glass-card mission-card animate-in" style="animation-delay: ${index * 0.1}s">
                            <div class="mission-header">
                                <div class="mission-info">
                                    <span class="badge ${task.category}">${task.category.toUpperCase()} WASTE</span>
                                    <div class="mission-id">Incident #${task._id.substr(-6).toUpperCase()}</div>
                                </div>
                                <div class="mission-meta">
                                    <i class="fas fa-clock"></i> ${new Date(task.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                </div>
                            </div>
                            
                            <div class="mission-details">
                                <div class="detail-item">
                                    <i class="fas fa-location-dot"></i>
                                    <span>${task.location.address || 'GPS Coordinates Captured'}</span>
                                </div>
                                <div class="reporter-note">
                                    <b>Note:</b> ${task.description || 'No specific instructions provided.'}
                                </div>
                            </div>

                            ${task.images && task.images.length > 0 ? `
                                <div class="mission-image">
                                    <img src="${task.images[0]}" alt="Waste report">
                                </div>
                            ` : ''}

                            <div class="mission-actions">
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${task.location.lat},${task.location.lng}" target="_blank" class="btn-premium">
                                    <i class="fas fa-location-arrow"></i> Navigate
                                </a>
                                <button class="btn-premium secondary" onclick="openCompleteModal('${task._id}')">
                                    <i class="fas fa-check-double"></i> Complete
                                </button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (err) {
                console.error('Task sync error:', err);
                showToast('Mission queue sync failed.', 'error');
            }
        }

        function openCompleteModal(id) {
            document.getElementById('currentReportId').innerText = id;
            showModal('completeModal');
        }

        async function submitCompletion() {
            const reportId = document.getElementById('currentReportId').innerText;
            const weight = document.getElementById('collectionWeight').value;
            const notes = document.getElementById('collectionNotes').value;

            try {
                const res = await fetchWithAuth(`${API_URL}/driver/complete-collection`, {
                    method: 'POST',
                    body: JSON.stringify({ reportId, weight, notes })
                });

                if (res && res.ok) {
                    hideModal('completeModal');
                    showToast('Mission secured! Well done.', 'success');
                    initDriverPage();
                }
            } catch (err) {
                console.error('Completion error:', err);
                showToast('Failed to log completion.', 'error');
            }
        }
    </script>
</body>
</html>
